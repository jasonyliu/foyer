name: CI

on:
  push:
  pull_request:

defaults:
  run:
    working-directory: apps/site

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/site/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
